name: 智学网成绩监控

on:
  schedule:
    # 错开整点，避免排队拥堵（每5分钟，但避开 :00, :05, :10 等整点）
    # UTC 时间，北京时间 = UTC + 8 小时
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:
    inputs:
      exam_id:
        description: '📝 考试ID（必填）'
        required: true
        default: ''
      exam_title:
        description: '📚 考试名称（可选，不填则使用考试ID）'
        required: false
        default: ''
      end_time:
        description: '⏰ 截止时间（UTC，格式：YYYY-MM-DD HH:MM:SS，留空则取消限制）'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码、创建/删除分支

    steps:
      # ==================== 调试：打印当前时间 ====================
      - name: 打印当前 UTC 时间
        run: date -u

      # ==================== 检出代码（master 分支） ====================
      - name: 检出代码（master分支）
        uses: actions/checkout@v4
        with:
          ref: master

      # ==================== 拉取历史状态（从 work 分支） ====================
      - name: 拉取历史状态（work分支）
        run: |
          git fetch origin work || true
          if git show-ref --verify --quiet refs/remotes/origin/work; then
            git checkout origin/work -- state.json 2>/dev/null || echo "ℹ️ work分支中暂无 state.json"
          else
            echo "ℹ️ work分支尚未创建"
          fi

      # ==================== 设置 Python 环境 ====================
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==================== 安装依赖 ====================
      - name: 安装依赖
        run: pip install requests

      # ==================== 运行监控脚本 ====================
      - name: 运行监控脚本
        env:
          ZHIXUE_XTOKEN: ${{ secrets.ZHIXUE_XTOKEN }}
          ZHIXUE_TOKEN: ${{ secrets.ZHIXUE_TOKEN }}
          ZHIXUE_AUTHGUID: ${{ secrets.ZHIXUE_AUTHGUID }}
          ZHIXUE_AUTHTIMESTAMP: ${{ secrets.ZHIXUE_AUTHTIMESTAMP }}
          ZHIXUE_AUTHTOKEN: ${{ secrets.ZHIXUE_AUTHTOKEN }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          EXAM_ID: ${{ github.event.inputs.exam_id }}
          EXAM_TITLE: ${{ github.event.inputs.exam_title }}
          END_TIME: ${{ github.event.inputs.end_time }}
        run: python monitor.py

      # ==================== 如果已过期，删除 work 分支 ====================
      - name: 删除 work 分支（监控已停止）
        if: hashFiles('.expired') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          if git show-ref --verify --quiet refs/remotes/origin/work; then
            git push origin --delete work
            echo "✅ work分支已删除"
          else
            echo "ℹ️ work分支不存在，跳过删除"
          fi

      # ==================== 如果未过期，推送状态到 work 分支 ====================
      - name: 推送状态文件到 work 分支（监控运行中）
        if: hashFiles('.expired') == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ ! -f state.json ]; then
            echo "⚠️ state.json 不存在，跳过推送"
            exit 0
          fi
          
          # 1. 备份 state.json 到临时目录
          cp state.json /tmp/state.json
          
          # 2. 清除当前工作区的 state.json（避免干扰分支切换）
          git checkout -- state.json 2>/dev/null || rm -f state.json
          
          # 3. 切换到 work 分支（如果不存在则创建）
          git fetch origin work || true
          if git show-ref --verify --quiet refs/remotes/origin/work; then
            git checkout work
            git pull origin work --rebase   # 此时工作区干净，可以安全拉取
          else
            git checkout --orphan work
            git rm -rf . || true
            echo "# Work branch for state files" > README.md
            git add README.md
            git commit -m "Initialize work branch"
          fi
          
          # 4. 恢复 state.json 并提交
          cp /tmp/state.json .
          git add state.json
          if git diff --staged --quiet; then
            echo "ℹ️ state.json 无变化，无需提交"
          else
            git commit -m "Update state [skip ci]"
            git push origin work
            echo "✅ state.json 已推送到 work 分支"
          fi
